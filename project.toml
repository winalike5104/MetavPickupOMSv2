# project.toml 用于配置 Google Cloud Buildpacks
[_]
schema-version = "0.2"

[project]
id = "pickup-system"
name = "Pickup Management System"
version = "1.0.0"

[[build.env]]
name = "GOOGLE_NODEJS_VERSION"
value = "20.x"

[[build.env]]
name = "GOOGLE_ENTRYPOINT"
value = "npm start"

[[build.env]]
name = "GOOGLE_BUILDABLE"
value = "."
